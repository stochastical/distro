name: Package, release, publish
on:
  push:
    tags: [ v* ]

env:
  REGISTRY_REPO: typst/packages
  REGISTRY_FORK: stochastical/typst-packages
  PATH_PREFIX: packages/preview
  PKG_NAME: ""   # set dynamically in the Validate metadata step
  PKG_ID: ""     # set dynamically in the Validate metadata step

jobs:
  release:
    name: Package, release, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: nu {0}

    steps:
      - uses: actions/checkout@v6

      - uses: hustcer/setup-nu@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Validate ────────────────────────────────────────────────────────────
      - name: Validate metadata
        run: |
          let pkg = (open typst.toml).package
          let tag = $env.GITHUB_REF_NAME

          if $tag != $"v($pkg.version)" {
            error make {msg: $"Tag '($tag)' does not match typst.toml version '($pkg.version)'"}
          }

          let git_name  = (^git log -1 --pretty=format:'%an' | str trim)
          let git_email = (^git log -1 --pretty=format:'%ae' | str trim)

          $"PKG_NAME=($pkg.name)\nPKG_VERSION=($pkg.version)\nPKG_ID=($pkg.name)-($pkg.version)\nGIT_USER_NAME=($git_name)\nGIT_USER_EMAIL=($git_email)\n"
          | save --append $env.GITHUB_ENV

      # ── 2. Package ─────────────────────────────────────────────────────────────
      - name: Package files
        run: |
          let pkg      = (open typst.toml).package
          let excludes = ($pkg.exclude? | default [])
          let out_dir  = $"out/($pkg.name)/($pkg.version)"

          # Expand each pattern: glob for wildcards, literal for bare names.
          # .git, out, and dist are always excluded.
          let excluded = (
            $excludes
            | each { |pat|
                let hits = (glob $pat)
                if ($hits | is-empty) { [$pat] } else { $hits | each { $in | path basename } }
              }
            | flatten
            | append ".git"
            | append "out"
            | append "dist"
            | uniq
          )

          mkdir $out_dir

          ls --all
          | where { |f| ($f.name | path basename) not-in $excluded }
          | each  { |f| cp --recursive $f.name $"($out_dir)/($f.name | path basename)" }

      # ── 3. Zip ─────────────────────────────────────────────────────────────────
      - name: Create release zip
        run: |
          mkdir dist
          cd out
          ^zip -r $"../dist/($env.PKG_ID).zip" $env.PKG_NAME

      # ── 4. GitHub release ──────────────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ env.PKG_ID }}.zip

      # ── 5. Registry checkout ───────────────────────────────────────────────────
      - name: Checkout package registry
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REGISTRY_REPO }}
          token: ${{ secrets.REGISTRY_TOKEN }}
          path: package-registry
          sparse-checkout: ${{ env.PATH_PREFIX }}/${{ env.PKG_NAME }}

      # ── 6. Publish ─────────────────────────────────────────────────────────────
      # The packaged files are already on disk in out/ — no unzip needed.
      - name: Commit and push to fork
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          let dest = $"package-registry/($env.PATH_PREFIX)/($env.PKG_NAME)"
          mkdir $dest
          mv $"out/($env.PKG_NAME)/($env.PKG_VERSION)" $dest

          cd package-registry
          ^git config user.name  $env.GIT_USER_NAME
          ^git config user.email $env.GIT_USER_EMAIL
          ^git checkout -b $env.PKG_ID
          ^git add .
          ^git commit -m $"($env.PKG_NAME):($env.PKG_VERSION)"

          ^gh auth setup-git
          ^git remote add fork $"https://github.com/($env.REGISTRY_FORK)"
          ^git push --force --set-upstream fork $env.PKG_ID
